<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dispatch Montreal | Volunteer Pages</title>
	<style>
		:root {
			--bg: #f6f7fb;
			--card: #ffffff;
			--text: #1f2937;
			--muted: #6b7280;
			--accent: #0f766e;
			--accent-hover: #115e59;
			--border: #e5e7eb;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
			color: var(--text);
			background: linear-gradient(160deg, #eef8f6 0%, var(--bg) 45%, #f9f7ef 100%);
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.card {
			width: min(760px, 100%);
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 28px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
		}

		h1 {
			margin: 0 0 8px;
			font-size: 1.8rem;
		}

		p {
			margin: 0 0 18px;
			color: var(--muted);
			line-height: 1.5;
		}

		ul {
			margin: 0;
			padding: 0;
			list-style: none;
			display: grid;
			gap: 12px;
		}

		a.page-link {
			display: block;
			text-decoration: none;
			color: var(--text);
			background: #fbfbfc;
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 12px 14px;
			transition: border-color 0.15s ease, transform 0.15s ease;
		}

		a.page-link:hover {
			border-color: #9ca3af;
			transform: translateY(-1px);
		}

		.primary {
			display: inline-block;
			margin-top: 20px;
			text-decoration: none;
			background: var(--accent);
			color: #fff;
			border-radius: 10px;
			padding: 10px 14px;
			font-weight: 600;
		}

		.primary:hover {
			background: var(--accent-hover);
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Volunteer Interface</h1>
		<p>Select a page below to open the volunteer workflow screens.</p>

		<ul>
			<li><a class="page-link" href="Volunteer login screen.html">Volunteer Login Screen</a></li>
			<li><a class="page-link" href="Dispatch notification page.html">Dispatch Notification Page</a></li>
			<li><a class="page-link" href="Assignment details.html">Assignment Details</a></li>
			<li><a class="page-link" href="Welfare check submission.html">Welfare Check Submission</a></li>
		</ul>

		<a class="primary" href="Volunteer login screen.html">Start From Login</a>
	</main>
</body>
</html>
